[package]
name = "overcyber-backend"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"

[profile.release]
lto = true
codegen-units = 1
strip = true
opt-level = 3

[dependencies]
axum = { version = "0.7", features = ["macros", "http2"] }
tokio = { version = "1", features = ["full"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["compression-gzip", "trace", "limit", "cors"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

rusqlite = { version = "0.31", features = ["bundled", "chrono"] }
r2d2 = "0.8"
r2d2_sqlite = "0.24"

serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Crypto primitives (audited RustCrypto crates — re-implementing these is unsafe)
argon2 = "0.5"
hmac = "0.12"
sha2 = "0.10"
sha1 = "0.10"
subtle = "2"
base32 = "0.5"
base64 = "0.22"
rand = "0.8"

uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
thiserror = "1"
